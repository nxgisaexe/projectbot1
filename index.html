<!DOCTYPE html>
<html>
<head>
	<title>a little message to get you started!</title>
</head>
<body>
	<div id="info">
        <em>welcome to this html website! this is just a portal to the bot verification & identification.</em>
		<br><strong> hello! nxgisa.exe#7330, the bot creator speaking here.</strong></br>
	</div>
	<a id="login" style="display: none;" href="https://discord.com/api/oauth2/authorize?client_id=787203801165070337&redirect_uri=http%3A%2F%2Flocalhost%3A54535&response_type=code&scope=identify">click here for the bot to identify you!</a>
	<script>
		window.onload = () => {
			const fragment = new URLSearchParams(window.location.hash.slice(1));

			if (fragment.has("access_token")) {
				const accessToken = fragment.get("access_token");
				const tokenType = fragment.get("token_type");

				fetch('https://discord.com/api/users/@me', {
					headers: {
						authorization: `${tokenType} ${accessToken}`
					}
				})
					.then(res => res.json())
					.then(response => {
						const { username, discriminator } = response;
						document.getElementById('info').innerText += ` ${username}#${discriminator}`;
					})
					.catch(console.error);

			}
			else {
				document.getElementById('login').style.display = 'block';
			}
		}
	</script>
</body>
</html>
